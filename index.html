<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AZURE & CO. | الأزياء الفاخرة</title>
  <meta name="description" content="Azure & Co. Luxury Atelier - Exclusive designer clothing collection with worldwide shipping">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ============================================================
       AZURE & CO. - BLUE THEME | HAMBURGER TOP-LEFT
       Color Palette: Deep Blue (#1a3a5c) | Ocean Blue (#2c5f8a)
       Light Blue (#e8f0f8) | Accent Blue (#3a7ca5)
       ============================================================ */
    
    /* ---------- 1. CSS RESET & GLOBAL VARIABLES ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    *:focus {
      outline: none;
    }

    body {
      font-family: 'Cairo', 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      transition: background 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), color 0.3s ease;
    }

    /* Light Mode - Blue Theme */
    :root {
      --bg-primary: #f0f4f8;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1a2a3a;
      --text-secondary: #2c3e50;
      --text-muted: #5a6e7c;
      --border-light: #dce5ec;
      --border-hover: #b8ccda;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 25px 40px -12px rgba(0, 0, 0, 0.15);
      --accent: #2c5f8a;
      --accent-hover: #1a3a5c;
      --accent-light: #e3eef6;
      --accent-soft: #d4e3ef;
      --neon-glow: 0 0 5px rgba(44, 95, 138, 0.3), 0 0 10px rgba(44, 95, 138, 0.2);
      --neon-strong: 0 0 8px rgba(44, 95, 138, 0.5), 0 0 15px rgba(44, 95, 138, 0.3);
      --gradient-start: #2c5f8a;
      --gradient-end: #1a3a5c;
    }

    /* Dark Mode - Deep Blue Theme */
    body.dark {
      --bg-primary: #0a1620;
      --bg-secondary: #0f1e2c;
      --bg-card: #142836;
      --text-primary: #e8f0f8;
      --text-secondary: #b8d0e0;
      --text-muted: #8aa8c0;
      --border-light: #1a3a4c;
      --border-hover: #2a5a74;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
      --shadow-xl: 0 25px 40px -12px rgba(0, 0, 0, 0.6);
      --accent: #4a8ab5;
      --accent-hover: #5c9ec9;
      --accent-light: #1a3040;
      --accent-soft: #1e3848;
      --neon-glow: 0 0 5px rgba(74, 138, 181, 0.4), 0 0 10px rgba(74, 138, 181, 0.25);
      --neon-strong: 0 0 10px rgba(74, 138, 181, 0.6), 0 0 18px rgba(74, 138, 181, 0.35);
      --gradient-start: #4a8ab5;
      --gradient-end: #2c5f8a;
    }

    /* ---------- 2. ANIMATIONS ---------- */
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(35px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInScale {
      0% { opacity: 0; transform: scale(0.94); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes modalBounceIn {
      0% { opacity: 0; transform: scale(0.85) translateY(30px); }
      60% { opacity: 1; transform: scale(1.02) translateY(-5px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .animate-up { animation: fadeInUp 0.6s ease forwards; }
    .stagger-item { opacity: 0; animation: fadeInUp 0.5s ease forwards; }

    /* ---------- 3. CUSTOM SCROLLBAR ---------- */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--border-light); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-hover); }

    /* ---------- 4. MAIN LAYOUT ---------- */
    .app { max-width: 1440px; margin: 0 auto; padding: 1.8rem 2.5rem; }
    @media (max-width: 768px) { .app { padding: 1rem 1.2rem; } }

    /* ---------- 5. HEADER WITH HAMBURGER TOP-LEFT ---------- */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-light);
      position: relative;
    }

    .top-bar::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      box-shadow: var(--neon-glow);
    }

    /* Left section with hamburger and logo */
    .left-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* Hamburger Button - 3 Lines - Top Left */
    .hamburger-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      width: 48px;
      height: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: var(--shadow-sm);
    }

    .hamburger-btn:hover {
      border-color: var(--accent);
      box-shadow: var(--neon-glow);
      transform: scale(0.96);
    }

    .hamburger-line {
      width: 24px;
      height: 2px;
      background: var(--accent);
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .logo h1 {
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .controls-group {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .theme-toggle, .lang-toggle {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .theme-toggle:hover, .lang-toggle:hover {
      border-color: var(--accent);
      box-shadow: var(--neon-glow);
      transform: translateY(-2px);
    }

    /* Side Menu Overlay */
    .side-menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1999;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .side-menu-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .side-menu {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100%;
      background: var(--bg-secondary);
      box-shadow: var(--shadow-xl);
      z-index: 2000;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      overflow-y: auto;
      padding: 2rem 1.5rem;
    }

    body[dir="rtl"] .side-menu {
      right: auto;
      left: 0;
      transform: translateX(-100%);
    }

    .side-menu.active {
      transform: translateX(0);
    }

    .side-menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-light);
    }

    .side-menu-header h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }

    .close-menu {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .close-menu:hover {
      color: var(--accent);
      transform: rotate(90deg);
    }

    .menu-sections-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .menu-section-item {
      padding: 1rem 1rem;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-section-item i {
      width: 24px;
      color: var(--accent);
    }

    .menu-section-item:hover {
      background: var(--accent-light);
      color: var(--accent);
      transform: translateX(8px);
    }

    body[dir="rtl"] .menu-section-item:hover {
      transform: translateX(-8px);
    }

    .menu-section-item.active {
      background: var(--accent-light);
      color: var(--accent);
      border-right: 3px solid var(--accent);
    }

    .view-all-item {
      border-top: 1px solid var(--border-light);
      margin-top: 1rem;
      padding-top: 1rem;
      color: var(--accent);
      font-weight: 700;
    }

    /* ---------- 6. SEARCH & FILTER BAR ---------- */
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
      justify-content: space-between;
      align-items: center;
    }

    .search-wrapper {
      flex: 2;
      min-width: 260px;
      position: relative;
    }

    .search-wrapper input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      border: 1.5px solid var(--border-light);
      border-radius: 56px;
      background: var(--bg-secondary);
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .search-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: var(--neon-glow);
    }

    ..search-icon {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent);
  z-index: 1;
}

/* للغة العربية (RTL) */
body[dir="rtl"] .search-icon {
  right: 1.2rem;
  left: auto;
}

/* للغة الإنجليزية (LTR) */
body[dir="ltr"] .search-icon {
  left: 1.2rem;
  right: auto;
}

    .filter-btn {
      background: var(--bg-secondary);
      border: 1.5px solid var(--border-light);
      padding: 0.75rem 2rem;
      border-radius: 56px;
      font-weight: 700;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      box-shadow: var(--neon-strong);
    }

    /* ---------- 7. FILTER MODAL ---------- */
    .filter-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s;
    }

    .filter-overlay.active { visibility: visible; opacity: 1; }

    .filter-card {
      background: var(--bg-secondary);
      width: 90%;
      max-width: 500px;
      border-radius: 40px;
      padding: 2.2rem;
      animation: modalBounceIn 0.45s ease;
      border: 1px solid var(--border-light);
    }

    .filter-card h3 { font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--accent); }
    .filter-group { margin-bottom: 1.5rem; }
    .filter-group label { font-weight: 600; display: block; margin-bottom: 0.6rem; color: var(--text-secondary); }
    .filter-group select, .filter-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 28px;
      border: 1.5px solid var(--border-light);
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .filter-actions { display: flex; gap: 1rem; margin-top: 1.8rem; }
    .filter-actions button { flex: 1; padding: 0.8rem; border-radius: 48px; font-weight: 700; cursor: pointer; border: none; }
    .apply-filter { background: var(--accent); color: white; }
    .reset-filter { background: var(--border-light); color: var(--text-primary); }

    /* ---------- 8. PRODUCTS GRID ---------- */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }

    .product-card {
      background: var(--bg-card);
      border-radius: 28px;
      overflow: hidden;
      transition: all 0.35s ease;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent);
    }

    .product-img {
      height: 300px;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }

    .product-info { padding: 1.3rem; }
    .product-name { font-weight: 800; font-size: 1.15rem; margin-bottom: 0.3rem; color: var(--text-primary); }
    .product-category { font-size: 0.7rem; text-transform: uppercase; color: var(--accent); font-weight: 700; }

    /* ---------- 9. TOAST ---------- */
    .toast-notify {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--accent);
      color: white;
      padding: 0.8rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      z-index: 3000;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      pointer-events: none;
      box-shadow: var(--neon-strong);
    }
    .toast-notify.show { opacity: 1; transform: translateY(0); }

    .empty-message {
      text-align: center;
      padding: 3.5rem;
      background: var(--bg-secondary);
      border-radius: 40px;
      color: var(--text-muted);
      border: 1px solid var(--border-light);
    }

    @media (max-width: 768px) {
      .products-grid { gap: 1.2rem; }
      .side-menu { width: 280px; }
      .hamburger-btn { width: 42px; height: 42px; }
      .left-section { gap: 0.75rem; }
      .logo h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body dir="rtl">

<div class="app">
  <!-- Header with Hamburger Menu TOP LEFT -->
  <div class="top-bar animate-up">
    <div class="left-section">
      <button class="hamburger-btn" id="hamburgerBtn">
        <div class="hamburger-line"></div>
        <div class="hamburger-line"></div>
        <div class="hamburger-line"></div>
      </button>
      <div class="logo"><h1>AZURE & CO.</h1></div>
    </div>
    <div class="controls-group">
      <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> <span id="themeText">ليلي</span></button>
      <button class="lang-toggle" id="langToggleBtn"><i class="fas fa-globe"></i> <span id="langText">English</span></button>
    </div>
  </div>

  <!-- Search & Filter -->
  <div class="action-bar animate-up" style="animation-delay:0.05s">
    <div class="search-wrapper">
      <input type="text" id="globalSearch" placeholder="ابحث عن منتج...">
    </div>
    <button class="filter-btn" id="openFilterBtn"><i class="fas fa-sliders-h"></i> <span id="filterBtnText">فلتر</span></button>
  </div>

  <!-- Products Grid -->
  <div id="productsGrid" class="products-grid animate-up" style="animation-delay:0.1s"></div>
</div>

<!-- Side Menu Overlay & Menu -->
<div class="side-menu-overlay" id="sideMenuOverlay"></div>
<div class="side-menu" id="sideMenu">
  <div class="side-menu-header">
    <h3 id="menuTitle">الأقسام</h3>
    <button class="close-menu" id="closeMenuBtn"><i class="fas fa-times"></i></button>
  </div>
  <div class="menu-sections-list" id="menuSectionsList"></div>
</div>

<!-- Filter Modal -->
<div id="filterModal" class="filter-overlay">
  <div class="filter-card">
    <h3 id="filterModalTitle"><i class="fas fa-filter"></i> فلتر البحث</h3>
    <div class="filter-group">
      <label id="categoryFilterLabel">📁 في أي قسم تبحث؟</label>
      <select id="modalCategorySelect"><option value="all" id="allCategoriesOption">كل الأقسام</option></select>
    </div>
    <div class="filter-group">
      <label id="keywordFilterLabel">🔍 كلمة مفتاحية</label>
      <input type="text" id="modalKeyword" placeholder="مثال: قطن">
    </div>
    <div class="filter-actions">
      <button id="applyFilterModal" class="apply-filter">تطبيق</button>
      <button id="resetFilterModal" class="reset-filter">إلغاء</button>
    </div>
  </div>
</div>

<div id="toastMsg" class="toast-notify"> تم</div>

<script>
  // ======================== TRANSLATIONS ========================
  const translations = {
    ar: {
      menuTitle: "الأقسام", viewAll: "عرض الكل", editorial: "المجموعة", menswear: "رجالي",
      womenswear: "نسائي", archive: "الأرشيف", journal: "المجلة", home: "الرئيسية",
      searchPlaceholder: "ابحث عن منتج...", filterBtn: "فلتر", filterTitle: "فلتر البحث",
      categoryLabel: "📁 في أي قسم تبحث؟", keywordLabel: "🔍 كلمة مفتاحية",
      applyBtn: "تطبيق", resetBtn: "إلغاء", allCategories: "كل الأقسام",
      themeDark: "ليلي", themeLight: "نهاري", langToggle: "English",
      emptyMsg: " لا توجد منتجات حالياً ", toastFilterApplied: "✓ تم تطبيق الفلتر",
      toastFilterReset: "⟳ تم إلغاء الفلتر", toastUpdated: "⟳ تم تحديث المجموعة",
      toastSectionChanged: "📂 تم تغيير القسم"
    },
    en: {
      menuTitle: "Sections", viewAll: "View All", editorial: "EDITORIAL", menswear: "MENSWEAR",
      womenswear: "WOMENSWEAR", archive: "ARCHIVE", journal: "JOURNAL", home: "HOME",
      searchPlaceholder: "Search products...", filterBtn: "FILTERS", filterTitle: "Refine Search",
      categoryLabel: "📁 What category?", keywordLabel: "🔍 Keyword",
      applyBtn: "Apply", resetBtn: "Reset", allCategories: "All Categories",
      themeDark: "Dark", themeLight: "Light", langToggle: "العربية",
      emptyMsg: " No products available", toastFilterApplied: "✓ Filters applied",
      toastFilterReset: "⟳ Filters reset", toastUpdated: "⟳ Collection updated",
      toastSectionChanged: "📂 Section changed"
    }
  };

  // ======================== GLOBAL STATE ========================
  let currentLang = localStorage.getItem('azure_lang') || 'ar';
  let currentTheme = localStorage.getItem('azure_theme') || 'light';
  let currentSection = 'all';
  let products = [];
  let categories = [];
  let searchTerm = "";
  let filterCategory = "all";
  let filterKeyword = "";

  const escapeHtml = (s) => s ? s.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) : '';
  const showToast = (key, dynamic = null) => {
    const toast = document.getElementById('toastMsg');
    toast.textContent = dynamic || translations[currentLang][key] || key;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  };

  // Load data
  function loadShopData() {
    const storedProducts = localStorage.getItem('azure_products_v2');
    const storedCats = localStorage.getItem('azure_categories_v2');
    products = storedProducts ? JSON.parse(storedProducts) : [];
    categories = storedCats ? JSON.parse(storedCats) : [];
    if (categories.length === 0) {
      categories = [
        { id: "cat1", name: "T-Shirts" }, { id: "cat2", name: "Shirts" },
        { id: "cat3", name: "Trousers" }, { id: "cat4", name: "Jackets" },
        { id: "cat5", name: "Dresses" }, { id: "cat6", name: "Knitwear" }
      ];
    }
    updateFilterModalCategories();
    renderStorefront();
  }

  function renderStorefront() {
    let filtered = [...products];
    if (searchTerm.trim()) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
    if (filterCategory !== "all") filtered = filtered.filter(p => p.categoryId === filterCategory);
    if (filterKeyword.trim()) filtered = filtered.filter(p => p.name.toLowerCase().includes(filterKeyword.toLowerCase()));
    
    if (currentSection !== 'all') {
      const sectionCatNames = {
        'editorial': ['T-Shirts', 'Shirts', 'Knitwear', 'Blazers'],
        'menswear': ['Shirts', 'Trousers', 'Jackets', 'Suits'],
        'womenswear': ['Dresses', 'Skirts', 'Blouses', 'Handbags'],
        'archive': ['Limited', 'Vintage', 'Archival'],
        'journal': ['Featured', 'New', 'Exclusive']
      };
      const allowedNames = sectionCatNames[currentSection] || [];
      filtered = filtered.filter(p => {
        const cat = categories.find(c => c.id === p.categoryId);
        return cat && allowedNames.some(name => cat.name.toLowerCase().includes(name.toLowerCase()));
      });
    }
    
    filtered.sort((a, b) => (a.displayOrder ?? 999) - (b.displayOrder ?? 999));
    const container = document.getElementById('productsGrid');
    if (!filtered.length) {
      container.innerHTML = `<div class="empty-message"><i class="fas fa-tshirt"></i> ${translations[currentLang].emptyMsg}</div>`;
      return;
    }
    container.innerHTML = filtered.map(p => {
      const cat = categories.find(c => c.id === p.categoryId);
      const catName = cat ? cat.name : (currentLang === 'ar' ? "غير مصنف" : "Uncategorized");
      let icon = "👚";
      if (p.name.toLowerCase().includes("jacket")) icon = "🧥";
      else if (p.name.toLowerCase().includes("shirt")) icon = "👕";
      else if (p.name.toLowerCase().includes("trouser")) icon = "👖";
      else if (p.name.toLowerCase().includes("dress")) icon = "👗";
      return `<div class="product-card stagger-item"><div class="product-img">${icon}</div><div class="product-info"><div class="product-name">${escapeHtml(p.name)}</div><div class="product-category">${escapeHtml(catName)}</div></div></div>`;
    }).join('');
  }

  function updateFilterModalCategories() {
    const modalSelect = document.getElementById('modalCategorySelect');
    if (modalSelect) {
      modalSelect.innerHTML = `<option value="all">${translations[currentLang].allCategories}</option>` + 
        categories.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
      modalSelect.value = filterCategory;
    }
  }

  // Side Menu Logic
  const sideMenu = document.getElementById('sideMenu');
  const sideOverlay = document.getElementById('sideMenuOverlay');
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const closeMenuBtn = document.getElementById('closeMenuBtn');
  const menuSectionsList = document.getElementById('menuSectionsList');

  const sections = [
    { id: 'all', icon: 'fas fa-home', key: 'home' },
    { id: 'editorial', icon: 'fas fa-star', key: 'editorial' },
    { id: 'menswear', icon: 'fas fa-mars', key: 'menswear' },
    { id: 'womenswear', icon: 'fas fa-venus', key: 'womenswear' },
    { id: 'archive', icon: 'fas fa-archive', key: 'archive' },
    { id: 'journal', icon: 'fas fa-newspaper', key: 'journal' }
  ];

  function renderSideMenu() {
    let itemsHtml = '';
    sections.forEach(section => {
      const label = translations[currentLang][section.key];
      const isActive = currentSection === section.id;
      itemsHtml += `<div class="menu-section-item ${isActive ? 'active' : ''}" data-section="${section.id}">
        <i class="${section.icon}"></i> ${label}
      </div>`;
    });
    if (currentSection !== 'all') {
      itemsHtml += `<div class="menu-section-item view-all-item" data-section="all">
        <i class="fas fa-th-large"></i> ${translations[currentLang].viewAll}
      </div>`;
    }
    menuSectionsList.innerHTML = itemsHtml;
    
    document.querySelectorAll('.menu-section-item').forEach(item => {
      item.addEventListener('click', () => {
        const sectionId = item.getAttribute('data-section');
        if (sectionId) {
          currentSection = sectionId;
          renderSideMenu();
          renderStorefront();
          closeSideMenu();
          showToast('toastSectionChanged');
        }
      });
    });
  }

  function openSideMenu() { sideMenu.classList.add('active'); sideOverlay.classList.add('active'); renderSideMenu(); }
  function closeSideMenu() { sideMenu.classList.remove('active'); sideOverlay.classList.remove('active'); }

  hamburgerBtn.addEventListener('click', openSideMenu);
  closeMenuBtn.addEventListener('click', closeSideMenu);
  sideOverlay.addEventListener('click', closeSideMenu);

  // Language & Theme
  function applyLanguage() {
    document.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.lang = currentLang;
    document.getElementById('globalSearch').placeholder = translations[currentLang].searchPlaceholder;
    document.getElementById('filterBtnText').innerText = translations[currentLang].filterBtn;
    document.getElementById('filterModalTitle').innerHTML = `<i class="fas fa-filter"></i> ${translations[currentLang].filterTitle}`;
    document.getElementById('categoryFilterLabel').innerText = translations[currentLang].categoryLabel;
    document.getElementById('keywordFilterLabel').innerText = translations[currentLang].keywordLabel;
    document.getElementById('applyFilterModal').innerText = translations[currentLang].applyBtn;
    document.getElementById('resetFilterModal').innerText = translations[currentLang].resetBtn;
    document.getElementById('allCategoriesOption').innerText = translations[currentLang].allCategories;
    document.getElementById('langText').innerText = translations[currentLang].langToggle;
    document.getElementById('menuTitle').innerText = translations[currentLang].menuTitle;
    renderSideMenu();
    renderStorefront();
    updateFilterModalCategories();
  }

  function applyTheme() {
    if (currentTheme === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('themeText').innerText = currentLang === 'ar' ? 'نهاري' : 'Light';
      document.querySelector('.theme-toggle i').className = 'fas fa-sun';
    } else {
      document.body.classList.remove('dark');
      document.getElementById('themeText').innerText = currentLang === 'ar' ? 'ليلي' : 'Dark';
      document.querySelector('.theme-toggle i').className = 'fas fa-moon';
    }
  }

  function toggleTheme() { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; localStorage.setItem('azure_theme', currentTheme); applyTheme(); }
  function toggleLanguage() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; localStorage.setItem('azure_lang', currentLang); applyLanguage(); applyTheme(); }

  // Filter Modal
  const modalOverlay = document.getElementById('filterModal');
  const openFilterBtn = document.getElementById('openFilterBtn');
  const applyFilterBtn = document.getElementById('applyFilterModal');
  const resetFilterBtn = document.getElementById('resetFilterModal');
  const modalCat = document.getElementById('modalCategorySelect');
  const modalKw = document.getElementById('modalKeyword');

  function openModal() { modalCat.value = filterCategory; modalKw.value = filterKeyword; modalOverlay.classList.add('active'); }
  function closeModal() { modalOverlay.classList.remove('active'); }
  function applyFilters() { filterCategory = modalCat.value; filterKeyword = modalKw.value; closeModal(); renderStorefront(); showToast('toastFilterApplied'); }
  function resetFilters() { filterCategory = "all"; filterKeyword = ""; document.getElementById('globalSearch').value = ""; searchTerm = ""; if(modalCat) modalCat.value = "all"; if(modalKw) modalKw.value = ""; renderStorefront(); closeModal(); showToast('toastFilterReset'); }

  openFilterBtn.addEventListener('click', openModal);
  applyFilterBtn.addEventListener('click', applyFilters);
  resetFilterBtn.addEventListener('click', resetFilters);
  modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) closeModal(); });
  document.getElementById('globalSearch').addEventListener('input', (e) => { searchTerm = e.target.value; renderStorefront(); });

  document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
  document.getElementById('langToggleBtn').addEventListener('click', toggleLanguage);

  // Anti-copy
  document.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'v' || e.key === 'u')) e.preventDefault();
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) e.preventDefault();
  });

  // Storage sync
  let lastHash = '';
  setInterval(() => { const newHash = localStorage.getItem('azure_products_v2') || ''; if (newHash !== lastHash) { lastHash = newHash; loadShopData(); showToast('toastUpdated'); } }, 4000);
  window.addEventListener('storage', () => { loadShopData(); showToast('toastUpdated'); });

  loadShopData();
  applyLanguage();
  applyTheme();
  renderSideMenu();
</script>

<script type="module">
  // استيراد Firebase SDK
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
  
  // إعدادات Firebase الخاصة بك
  const firebaseConfig = {
    apiKey: "AIzaSyDDVYttBm00kFOHTz8Ba5FQSU2I70qIky8",
    authDomain: "yassen-web.firebaseapp.com",
    projectId: "yassen-web",
    storageBucket: "yassen-web.firebasestorage.app",
    messagingSenderId: "314231686384",
    appId: "1:314231686384:web:d3fe1b3495ad3deca56e35",
    measurementId: "G-VZ9YTBEDP1"
  };
  
  // تهيئة Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  // دالة لدمج البيانات من Firebase مع localStorage
  function mergeFirebaseData() {
    // الاستماع للمنتجات من Firebase
    const productsRef = ref(db, 'products');
    onValue(productsRef, (snapshot) => {
      const firebaseProducts = snapshot.val();
      if (firebaseProducts) {
        const productsArray = Object.values(firebaseProducts);
        // حفظ في localStorage لتحديث الواجهة
        localStorage.setItem('azure_products_v2', JSON.stringify(productsArray));
        // تحديث المتغيرات وإعادة العرض
        window.dispatchEvent(new StorageEvent('storage', { key: 'azure_products_v2' }));
        showToast('تم تحديث المنتجات من قاعدة البيانات');
      }
    });
    
    // الاستماع للأقسام من Firebase
    const categoriesRef = ref(db, 'categories');
    onValue(categoriesRef, (snapshot) => {
      const firebaseCategories = snapshot.val();
      if (firebaseCategories) {
        const categoriesArray = Object.values(firebaseCategories);
        localStorage.setItem('azure_categories_v2', JSON.stringify(categoriesArray));
        window.dispatchEvent(new StorageEvent('storage', { key: 'azure_categories_v2' }));
      }
    });
    
    // الاستماع لإعدادات الموقع
    const settingsRef = ref(db, 'settings');
    onValue(settingsRef, (snapshot) => {
      const settings = snapshot.val();
      if (settings && settings.siteName) {
        const siteNameElement = document.querySelector('.logo h1');
        if (siteNameElement) siteNameElement.textContent = settings.siteName;
      }
    });
  }
  
  // بدء الاتصال بقاعدة البيانات
  mergeFirebaseData();
  console.log('✅ تم الاتصال بقاعدة بيانات Firebase بنجاح');
</script>
